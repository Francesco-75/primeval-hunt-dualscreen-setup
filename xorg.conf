# /etc/X11/xorg.conf
# Configurazione nvidia TwinView per Primeval Hunt
# DVI-D-0 (NCR touchscreen) a sinistra (+0+0) — schermo principale gameplay
# HDMI-0 (LG TV 32") a destra (+640+0) — schermo touchscreen
# Il gioco mette gameplay a sinistra e touchscreen a destra (mode 2)

Section "ServerLayout"
    Identifier     "Layout0"
    Screen         0 "Screen0" 0 0
EndSection

Section "Monitor"
    Identifier     "Monitor-DVI-D-0"
    VendorName     "NCR"
    ModelName      "NCRATM15/24SB"
    HorizSync      28-80
    VertRefresh    56-80
    Option         "Primary" "true"
EndSection

Section "Monitor"
    Identifier     "Monitor-HDMI-0"
    VendorName     "LG"
    ModelName      "LG TV"
    HorizSync      30-83
    VertRefresh    58-62
    Option         "RightOf" "Monitor-DVI-D-0"
EndSection

Section "Device"
    Identifier     "Device0"
    Driver         "nvidia"
    VendorName     "NVIDIA Corporation"
    BoardName      "GeForce GT 1030"
    BusID          "PCI:6:0:0"
    Option         "TwinView"             "true"
    Option         "TwinViewXineramaInfo" "false"
    Option         "MetaModes"            "DVI-D-0: 640x480 +0+0, HDMI-0: 640x480 +640+0"
    Option         "Monitor-DVI-D-0"      "Monitor-DVI-D-0"
    Option         "Monitor-HDMI-0"       "Monitor-HDMI-0"
EndSection

Section "Screen"
    Identifier     "Screen0"
    Device         "Device0"
    Monitor        "Monitor-DVI-D-0"
    DefaultDepth    24
    SubSection "Display"
        Depth       24
        Virtual     1280 480
        Modes       "640x480"
    EndSubSection
EndSection
